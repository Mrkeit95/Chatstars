<script>
window.storage={
  async get(k,s){try{const p=s?'shared:':'local:';const v=localStorage.getItem(p+k);if(!v)throw new Error('not found');return{key:k,value:v,shared:!!s}}catch(e){throw e}},
  async set(k,v,s){try{const p=s?'shared:':'local:';localStorage.setItem(p+k,v);return{key:k,value:v,shared:!!s}}catch(e){return null}},
  async delete(k,s){try{const p=s?'shared:':'local:';localStorage.removeItem(p+k);return{key:k,deleted:true,shared:!!s}}catch(e){return null}},
  async list(pre,s){try{const p=s?'shared:':'local:';const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith(p+(pre||'')))keys.push(k.replace(p,''))}return{keys,prefix:pre,shared:!!s}}catch(e){return{keys:[]}}}
};

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const SK = "chatstars-academy";
const SP = "trainee:";
const AP = "account:";
async function loadProgress(){try{const r=await window.storage.get(SK);return r?JSON.parse(r.value):null}catch{return null}}
async function saveProgress(d){try{await window.storage.set(SK,JSON.stringify(d));if(d.user){await window.storage.set(SP+d.user.toLowerCase().replace(/\s+/g,"-"),JSON.stringify(d),true)}}catch(e){console.error("Save:",e)}}
async function loadAllTrainees(){try{const k=await window.storage.list(SP,true);if(!k?.keys?.length)return[];const t=[];for(const key of k.keys){try{const r=await window.storage.get(key,true);if(r?.value)t.push(JSON.parse(r.value))}catch{}}return t}catch{return[]}}
async function saveAccount(username,data){try{await window.storage.set(AP+username.toLowerCase().trim(),JSON.stringify(data),true)}catch{}}
async function loadAccount(username){try{const r=await window.storage.get(AP+username.toLowerCase().trim(),true);return r?JSON.parse(r.value):null}catch{return null}}
function initProgress(){return{user:null,email:null,telegram:null,country:null,isAdmin:false,completedModules:[],quizScores:{},exerciseResponses:{},startedAt:new Date().toISOString(),lastActive:new Date().toISOString()}}

function ProgressBar({value,color="var(--accent)",height=6}){return(<div className="progress-bar-container" style={{height}}><div className="progress-bar-fill" style={{width:`${Math.min(100,value)}%`,background:color}}/></div>)}

// ─── LOGIN / REGISTER ────────────────────────────────────────────────────────
// Pre-built admin accounts - these users never need to register
const ADMIN_ACCOUNTS = {
  "keit": { fullName: "Keit Dmitrijev", email: "admin@chatstars.com", telegram: "keit" },
  "keit dmitrijev": { fullName: "Keit Dmitrijev", email: "admin@chatstars.com", telegram: "keit" },
  "zein": { fullName: "Zein", email: "admin@chatstars.com", telegram: "zein" },
  "alex": { fullName: "Alex Bakalov", email: "admin@chatstars.com", telegram: "alex" },
  "alex bakalov": { fullName: "Alex Bakalov", email: "admin@chatstars.com", telegram: "alex" },
  "angelica": { fullName: "Angelica", email: "admin@chatstars.com", telegram: "angelica" }
};
const ADMIN_PASSWORD = "chatstars2026";
const DEFAULT_ENROLL_CODE = "CHATSTARS-TRAIN-2026";
const ENROLL_KEY = "enrollment-code";

async function getEnrollCode(){try{const r=await window.storage.get(ENROLL_KEY,true);return r?r.value:DEFAULT_ENROLL_CODE}catch{return DEFAULT_ENROLL_CODE}}
async function setEnrollCode(code){try{await window.storage.set(ENROLL_KEY,code,true)}catch{}}
async function deleteAccount(nameKey){try{await window.storage.delete(AP+nameKey,true);await window.storage.delete(SP+nameKey,true)}catch{}}
async function resetAccountPassword(nameKey,newPw){try{const r=await window.storage.get(AP+nameKey,true);if(r?.value){const a=JSON.parse(r.value);a.password=newPw;await window.storage.set(AP+nameKey,JSON.stringify(a),true);return true}}catch{}return false}

function LoginScreen({onLogin,onRegister}){
  const[mode,setMode]=useState("signin");
  const[signInName,setSignInName]=useState("");const[signInPw,setSignInPw]=useState("");
  const[resetName,setResetName]=useState("");const[resetEmail,setResetEmail]=useState("");const[resetDone,setResetDone]=useState(false);const[tempPw,setTempPw]=useState("");
  const[name,setName]=useState("");const[email,setEmail]=useState("");const[tg,setTg]=useState("");const[country,setCountry]=useState("");const[enrollCode,setEnrollCode]=useState("");const[newPw,setNewPw]=useState("");const[confirmPw,setConfirmPw]=useState("");
  const[err,setErr]=useState("");const[loading,setLoading]=useState(false);

  const countries=["Afghanistan","Albania","Algeria","Argentina","Armenia","Australia","Austria","Azerbaijan","Bahrain","Bangladesh","Belarus","Belgium","Bolivia","Bosnia and Herzegovina","Brazil","Bulgaria","Cambodia","Cameroon","Canada","Chile","China","Colombia","Costa Rica","Croatia","Czech Republic","Denmark","Dominican Republic","Ecuador","Egypt","El Salvador","Estonia","Ethiopia","Finland","France","Georgia","Germany","Ghana","Greece","Guatemala","Honduras","Hong Kong","Hungary","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy","Jamaica","Japan","Jordan","Kazakhstan","Kenya","Kosovo","Kuwait","Latvia","Lebanon","Libya","Lithuania","Malaysia","Mexico","Moldova","Mongolia","Montenegro","Morocco","Mozambique","Myanmar","Nepal","Netherlands","New Zealand","Nicaragua","Nigeria","North Macedonia","Norway","Oman","Pakistan","Panama","Paraguay","Peru","Philippines","Poland","Portugal","Qatar","Romania","Russia","Saudi Arabia","Senegal","Serbia","Singapore","Slovakia","Slovenia","South Africa","South Korea","Spain","Sri Lanka","Sweden","Switzerland","Taiwan","Thailand","Tunisia","Turkey","UAE","UK","Ukraine","United States","Uruguay","Uzbekistan","Venezuela","Vietnam","Other"];

  const hint={fontSize:11,color:"var(--text-muted)",marginTop:3,fontStyle:"italic"};

  const handleSignIn=async()=>{
    setErr("");if(!signInName.trim())return setErr("Enter your full name.");if(!signInPw)return setErr("Enter your password.");
    setLoading(true);
    const nameLower=signInName.trim().toLowerCase();
    // Check if admin
    if(ADMIN_ACCOUNTS[nameLower]){
      setLoading(true);
      // Check all possible keys for this admin (name aliases resolve to same person)
      const adminInfo=ADMIN_ACCOUNTS[nameLower];
      const possibleKeys=[nameLower.replace(/\s+/g,"-"),adminInfo.fullName.toLowerCase().replace(/\s+/g,"-")];
      let validPw=ADMIN_PASSWORD;
      for(const pk of possibleKeys){try{const sa=await loadAccount(pk);if(sa?.password){validPw=sa.password;break;}}catch{}}
      setLoading(false);
      if(signInPw!==validPw)return setErr("Incorrect password.");
      onLogin({...adminInfo,password:validPw,isBuiltInAdmin:true});
      return;
    }
    // Regular user - check stored account
    const key=nameLower.replace(/\s+/g,"-");
    const acct=await loadAccount(key);
    setLoading(false);
    if(!acct)return setErr("Account not found. Need to create one?");
    if(acct.password!==signInPw)return setErr("Incorrect password.");
    onLogin(acct);
  };

  const handleForgotPw=async()=>{
    setErr("");if(!resetName.trim())return setErr("Enter your full name.");if(!resetEmail.trim()||!resetEmail.includes("@"))return setErr("Enter your email address.");
    setLoading(true);
    const key=resetName.trim().toLowerCase().replace(/\s+/g,"-");
    const acct=await loadAccount(key);
    setLoading(false);
    if(!acct)return setErr("Account not found with that name.");
    if(acct.email?.toLowerCase()!==resetEmail.trim().toLowerCase())return setErr("Email doesn't match the account on file.");
    // Generate temp password
    const tmp="TEMP-"+Math.random().toString(36).substring(2,8).toUpperCase();
    acct.password=tmp;
    await saveAccount(key,acct);
    setTempPw(tmp);setResetDone(true);
  };

  const handleRegister=async()=>{
    setErr("");
    if(!name.trim())return setErr("Enter your full name.");
    if(!email.trim()||!email.includes("@"))return setErr("Enter a valid email address.");
    if(!tg.trim())return setErr("Enter your Telegram handle.");
    if(!country)return setErr("Select your country.");
    // ENROLLMENT CODE DISABLED FOR NOW — re-enable later by uncommenting below
    // if(!enrollCode.trim())return setErr("Enter the enrollment code provided by your manager.");
    if(!newPw)return setErr("Choose a password.");
    if(newPw.length<4)return setErr("Password must be at least 4 characters.");
    if(newPw!==confirmPw)return setErr("Passwords don't match.");
    // Block registering as admin name
    if(ADMIN_ACCOUNTS[name.trim().toLowerCase()])return setErr("This name is reserved. If you're an admin, use Sign In instead.");
    setLoading(true);
    // ENROLLMENT CODE CHECK DISABLED FOR NOW — re-enable later
    // const validCode=await getEnrollCode();
    // if(enrollCode.trim().toUpperCase()!==validCode.toUpperCase()){setLoading(false);return setErr("Invalid enrollment code. Contact your manager for the correct code.");}
    const key=name.trim().toLowerCase().replace(/\s+/g,"-");
    const existing=await loadAccount(key);
    if(existing){setLoading(false);return setErr("An account with this name already exists. Try signing in.");}
    const acct={fullName:name.trim(),email:email.trim(),telegram:tg.trim().replace(/^@/,""),country:country,password:newPw,createdAt:new Date().toISOString()};
    await saveAccount(key,acct);
    setLoading(false);
    onRegister(acct);
  };

  const tabStyle=(active)=>({flex:1,padding:"10px",background:active?"var(--accent)":"var(--bg-input)",color:active?"#fff":"var(--text-muted)",border:"none",borderRadius:"8px",fontSize:"13px",fontWeight:600,cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s"});

  return(<div className="login-screen"><div className="login-card fade-in" style={{maxWidth:440}}>
    <h1>CHAT<span>STARS</span></h1><h2>Training Academy</h2><p style={{marginBottom:20}}>Sign in or create your account</p>
    <div style={{display:"flex",gap:8,marginBottom:24}}>

          <div style={{padding:"14px 20px",background:"var(--bg-input)",border:"2px solid var(--success)",borderRadius:10,fontSize:18,fontWeight:700,letterSpacing:2,color:"var(--success)",fontFamily:"monospace",marginBottom:16}}>{tempPw}</div>
          <div style={{fontSize:12,color:"var(--text-muted)",marginBottom:20}}>Copy this password and use it to sign in. Then go to Settings to set a new permanent password.</div>
        </div>
      </>}
      <p style={{fontSize:12,color:"var(--text-muted)",marginTop:12}}>Remember your password? <span style={{color:"var(--accent)",cursor:"pointer",fontWeight:500}} onClick={()=>{setMode("signin");setErr("");setResetDone(false)}}>Sign in</span></p>
    </>:mode==="signin"?<>
      <div className="input-group"><label>Full Name</label><input value={signInName} onChange={e=>setSignInName(e.target.value)} placeholder="Enter your full name..." onKeyDown={e=>e.key==="Enter"&&handleSignIn()}/><div style={hint}>The exact full name you registered with</div></div>
      <div className="input-group"><label>Password</label><input type="password" value={signInPw} onChange={e=>setSignInPw(e.target.value)} placeholder="Enter your password..." onKeyDown={e=>e.key==="Enter"&&handleSignIn()}/></div>
      <button className="btn-primary full" onClick={handleSignIn} disabled={loading}>{loading?"Signing in...":"Sign In"}</button>
      <p style={{fontSize:12,color:"var(--text-muted)",marginTop:12}}>
        <span style={{color:"var(--accent)",cursor:"pointer",fontWeight:500}} onClick={()=>{setMode("forgot");setErr("");setResetDone(false)}}>Forgot password?</span>

        First time? <span style={{color:"var(--accent)",cursor:"pointer",fontWeight:500}} onClick={()=>{setMode("register");setErr("")}}>Create an account</span>

      <div className="input-group"><label>Email Address</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com"/><div style={hint}>Your correct email address — used for company communication</div></div>

      <div className="input-group"><label>Confirm Password</label><input type="password" value={confirmPw} onChange={e=>setConfirmPw(e.target.value)} placeholder="Confirm your password..." onKeyDown={e=>e.key==="Enter"&&handleRegister()}/></div>

    {err&&<div className="error-msg">{err}</div>}

}

// ─── ADMIN DASHBOARD ─────────────────────────────────────────────────────────
function AdminDashboard(){
  const[trainees,setTrainees]=useState([]);const[loading,setLoading]=useState(true);const[sel,setSel]=useState(null);const[filter,setFilter]=useState(null);const[countryFilter,setCountryFilter]=useState("");
  const{days}=TRAINING_DATA;const totalMods=days.reduce((s,d)=>s+d.modules.length,0);
  const fetch2=async()=>{setLoading(true);const d=await loadAllTrainees();setTrainees(d.filter(t=>t.user));setLoading(false)};
  useEffect(()=>{fetch2()},[]);
  const status=t=>{const p=Math.round((t.completedModules?.length||0)/totalMods*100);if(p===100)return"graduated";if(p===0)return"not-started";if(p<30)return"at-risk";return"in-progress"};
  const curDay=t=>{for(let i=days.length-1;i>=0;i--)if(days[i].modules.some(m=>t.completedModules?.includes(m.id)))return`Day ${i+1}`;return"Not started"};
  const avgScore=t=>{const s=Object.values(t.quizScores||{});return s.length?Math.round(s.reduce((a,b)=>a+b,0)/s.length):0};
  const grad=trainees.filter(t=>status(t)==="graduated").length;
  const active=trainees.filter(t=>["in-progress","at-risk"].includes(status(t))).length;
  const risk=trainees.filter(t=>status(t)==="at-risk").length;
  const notStarted=trainees.filter(t=>status(t)==="not-started").length;

  const filtered=(filter?trainees.filter(t=>{
    if(filter==="all")return true;
    if(filter==="active")return["in-progress","at-risk"].includes(status(t));
    if(filter==="at-risk")return status(t)==="at-risk";
    if(filter==="graduated")return status(t)==="graduated";
    if(filter==="not-started")return status(t)==="not-started";
    return true;
  }):trainees).filter(t=>!countryFilter||t.country===countryFilter);

  const allCountries=[...new Set(trainees.map(t=>t.country).filter(Boolean))].sort();

  const filterLabel={"all":"All Trainees","active":"Active Trainees","at-risk":"At Risk Trainees","graduated":"Graduated","not-started":"Not Started"};

  const StatCard=({label,value,color,sub,filterKey})=>(
    <div className="stat-card" style={{cursor:"pointer",border:filter===filterKey?"2px solid "+(color||"var(--accent)"):"1px solid var(--border)",transition:"all 0.2s"}}
      onClick={()=>setFilter(filter===filterKey?null:filterKey)}>
      <div className="label">{label}</div>
      <div className="value" style={{color:color||"var(--text-primary)"}}>{value}</div>
      <div className="sub">{filter===filterKey?"✓ Showing":"Click to filter"} · {sub}</div>
    </div>
  );

  return(<div className="fade-in">
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
      <h1 style={{fontSize:24,fontWeight:700}}>👑 Admin Dashboard</h1>
      <button className="sign-out-btn" onClick={fetch2} style={{color:"var(--accent)",borderColor:"var(--accent)"}}>{loading?"Loading...":"↻ Refresh"}</button>
    </div>
    <p style={{color:"var(--text-secondary)",fontSize:14,marginBottom:28}}>Click any stat card to filter the table below. Click a trainee row to see their full profile.</p>
    <div className="stats-row">
      <StatCard label="Total Trainees" value={trainees.length} sub="enrolled" filterKey="all"/>
      <StatCard label="Active" value={active} color="var(--accent)" sub="in training" filterKey="active"/>
      <StatCard label="At Risk" value={risk} color="var(--danger)" sub="<30% progress" filterKey="at-risk"/>
      <StatCard label="Graduated" value={grad} color="var(--success)" sub="completed all" filterKey="graduated"/>
    </div>

    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:10}}>
      <h3 style={{fontSize:16,fontWeight:600}}>{filter?filterLabel[filter]||"All Trainees":"All Trainees"} ({filtered.length})</h3>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {allCountries.length>0&&<select value={countryFilter} onChange={e=>setCountryFilter(e.target.value)} style={{padding:"6px 10px",background:"var(--bg-input)",border:"1px solid var(--border)",borderRadius:6,color:countryFilter?"var(--text-primary)":"var(--text-muted)",fontSize:12,fontFamily:"inherit",cursor:"pointer",outline:"none"}}>
          <option value="">All Countries</option>{allCountries.map(c=><option key={c} value={c}>{c} ({trainees.filter(t=>t.country===c).length})</option>)}
        </select>}
        {(filter||countryFilter)&&<button className="sign-out-btn" onClick={()=>{setFilter(null);setCountryFilter("")}} style={{fontSize:11,padding:"4px 10px"}}>✕ Clear Filters</button>}
      </div>
    </div>

    {filtered.length===0&&!loading?
      <div className="stat-card" style={{textAlign:"center",padding:40}}><div style={{fontSize:32,marginBottom:12}}>{filter==="graduated"?"🎓":filter==="at-risk"?"⚠️":"📭"}</div><div style={{color:"var(--text-secondary)",fontSize:14}}>{filter?"No trainees match this filter.":"No trainees yet."}</div></div>
    :
      <div style={{borderRadius:12,overflow:"hidden",border:"1px solid var(--border)"}}>
        <table className="trainee-table"><thead><tr><th>Trainee</th><th>Country</th><th>Status</th><th>Progress</th><th>Avg Score</th><th>AI Flag</th><th>Modules</th></tr></thead>
        <tbody>{filtered.sort((a,b)=>(b.completedModules?.length||0)-(a.completedModules?.length||0)).map((t,i)=>{
          const st=status(t);const pct=Math.round((t.completedModules?.length||0)/totalMods*100);const avg=avgScore(t);
          const hasAiFlag=t.aiFlags&&Object.values(t.aiFlags).some(v=>v==="high"||v==="certain");
          const hasNotes=t.candidateNotes&&Object.values(t.candidateNotes).flat().length>0;
          return(<tr key={i} style={{cursor:"pointer"}} onClick={()=>setSel(t)}>
            <td style={{color:"var(--text-primary)",fontWeight:500}}>{t.user} {t.isAdmin&&<span className="admin-badge">Admin</span>} {hasNotes&&<span title="Has AI talent notes" style={{fontSize:10,cursor:"help"}}>📝</span>}</td>
            <td style={{fontSize:12}}>{t.country||<span style={{color:"var(--text-muted)"}}>—</span>}</td>
            <td><span className={`status-pill ${st}`}>{st.replace("-"," ")}</span></td>
            <td><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:60}}><ProgressBar value={pct} color={pct===100?"var(--success)":"var(--accent)"} height={4}/></div><span style={{fontSize:12,fontWeight:600}}>{pct}%</span></div></td>
            <td style={{color:avg>=70?"var(--success)":avg>0?"var(--danger)":"var(--text-muted)"}}>{avg>0?`${avg}%`:"—"}</td>
            <td>{hasAiFlag?<span style={{fontSize:10,padding:"2px 6px",borderRadius:4,fontWeight:700,background:"rgba(239,68,68,0.15)",color:"var(--danger)"}}>🤖 FLAGGED</span>:<span style={{fontSize:11,color:"var(--text-muted)"}}>Clean</span>}</td>
            <td>{t.completedModules?.length||0}/{totalMods}</td>
          </tr>)
        })}</tbody></table>
      </div>
    }
    {sel&&<div className="modal-overlay" onClick={()=>setSel(null)}>
      <div className="modal-card fade-in" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <h2 style={{fontSize:20,fontWeight:700,marginBottom:4}}>{sel.user}</h2>
            <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:6}}>
              {sel.country&&<span style={{fontSize:12,color:"var(--warning)"}}>🌍 {sel.country}</span>}
              {sel.email&&<span style={{fontSize:12,color:"var(--text-secondary)"}}>✉️ {sel.email}</span>}
              {sel.telegram&&<span style={{fontSize:12,color:"var(--cyan)"}}>✈️ @{sel.telegram}</span>}
            </div>
            <div style={{color:"var(--text-muted)",fontSize:12,marginBottom:20}}>
              Started: {new Date(sel.startedAt).toLocaleDateString()} · Last active: {sel.lastActive?new Date(sel.lastActive).toLocaleDateString():"—"} · Modules: {sel.completedModules?.length||0}/{totalMods} · Avg: {avgScore(sel)}%
              <span style={{marginLeft:8}} className={`status-pill ${status(sel)}`}>{status(sel).replace("-"," ")}</span>
            </div>
          </div>
          <button className="btn-secondary" onClick={()=>setSel(null)} style={{padding:"6px 12px",fontSize:12}}>✕</button>
        </div>
        {/* AI Flags */}
        {sel.aiFlags&&Object.keys(sel.aiFlags).length>0&&<div style={{padding:"12px 16px",borderRadius:10,marginBottom:16,background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)"}}>
          <div style={{fontSize:12,fontWeight:600,color:"var(--danger)",marginBottom:6}}>🤖 AI/ChatGPT Detection Flags</div>
          {Object.entries(sel.aiFlags).map(([modId,level])=>{const m=days.flatMap(d=>d.modules).find(x=>x.id===modId);return m?<div key={modId} style={{fontSize:12,color:"var(--text-secondary)",padding:"2px 0"}}>{m.title}: <span style={{fontWeight:600,color:level==="certain"||level==="high"?"var(--danger)":"var(--warning)"}}>{level.toUpperCase()}</span></div>:null})}
        </div>}
        {/* Candidate Notes */}
        {sel.candidateNotes&&Object.keys(sel.candidateNotes).length>0&&<div style={{padding:"12px 16px",borderRadius:10,marginBottom:16,background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.2)"}}>
          <div style={{fontSize:12,fontWeight:600,color:"var(--accent)",marginBottom:8}}>📝 AI Talent Assessment Notes</div>
          {Object.entries(sel.candidateNotes).map(([modId,notes])=>{const m=days.flatMap(d=>d.modules).find(x=>x.id===modId);return m&&notes?.length?<div key={modId} style={{marginBottom:6}}>
            <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:2}}>{m.title}:</div>
            {notes.map((n,ni)=><div key={ni} style={{fontSize:12,color:"var(--text-primary)",padding:"2px 0 2px 12px",borderLeft:"2px solid rgba(99,102,241,0.3)"}}>{n}</div>)}
          </div>:null})}
        </div>}
        {days.map(day=><div key={day.id} style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:8,color:day.color}}>{day.icon} {day.title} — {day.subtitle}</div>
          {day.modules.map(mod=>{const done=sel.completedModules?.includes(mod.id);const sc=sel.quizScores?.[mod.id];
            return(<div key={mod.id} className="module-score-row">
              <span style={{fontSize:14}}>{done?"✅":"⬜"}</span><span style={{flex:1}}>{mod.title}</span>
              <span style={{fontWeight:600,minWidth:50,textAlign:"right",color:sc>=70?"var(--success)":sc>0?"var(--danger)":"var(--text-muted)"}}>{sc!==undefined?`${Math.round(sc)}%`:"—"}</span>
            </div>)
          })}
        </div>)}
        {sel.exerciseResponses&&Object.keys(sel.exerciseResponses).length>0&&<div style={{marginTop:16}}>
          <h3 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Written Responses</h3>
          {Object.entries(sel.exerciseResponses).map(([modId,resp])=>{const mod=days.flatMap(d=>d.modules).find(m=>m.id===modId);if(!mod?.exercises)return null;
            return(<div key={modId} style={{marginBottom:16}}>
              <div style={{fontSize:12,fontWeight:600,color:"var(--text-muted)",marginBottom:8}}>{mod.title}</div>
              {mod.exercises.map((ex,i)=><div key={i} style={{marginBottom:8,padding:12,background:"var(--bg-input)",borderRadius:8}}>
                <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:4}}>{ex.prompt}</div>
                <div style={{fontSize:13,color:"var(--text-primary)"}}>{resp[i]||"No response"}</div>
              </div>)}
            </div>)
          })}
        </div>}
        {/* Admin Actions */}
        {!sel.isAdmin&&<div style={{marginTop:24,padding:16,background:"rgba(239,68,68,0.05)",border:"1px solid rgba(239,68,68,0.15)",borderRadius:10}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:12,color:"var(--danger)"}}>⚡ Admin Actions</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button className="btn-danger" onClick={async()=>{const np=prompt("Enter new password for "+sel.user+":");if(np&&np.length>=4){const k=sel.user.toLowerCase().replace(/\s+/g,"-");const ok=await resetAccountPassword(k,np);alert(ok?"Password reset successfully.":"Failed to reset — user may not have a stored account.")}}} style={{fontSize:12}}>🔑 Reset Password</button>
            <button className="btn-danger" onClick={async()=>{if(confirm("DELETE "+sel.user+"? This removes their account and all training progress permanently.")){const k=sel.user.toLowerCase().replace(/\s+/g,"-");await deleteAccount(k);setSel(null);fetch2()}}} style={{fontSize:12,background:"rgba(239,68,68,0.2)",borderColor:"rgba(239,68,68,0.4)"}}>🗑️ Delete User</button>
          </div>
        </div>}
      </div>
    </div>}
    {/* Enrollment Code Management */}
    {/* ENROLLMENT MANAGER DISABLED — re-enable later by uncommenting
    <EnrollmentManager/>
    */}
  </div>);
}

function EnrollmentManager(){
  const[code,setCode]=useState("");const[saved,setSaved]=useState(false);const[loading,setLoading]=useState(true);
  useEffect(()=>{getEnrollCode().then(c=>{setCode(c);setLoading(false)})},[]);
  const save=async()=>{if(code.trim().length<4)return;await setEnrollCode(code.trim().toUpperCase());setSaved(true);setTimeout(()=>setSaved(false),2000)};
  return(<div style={{marginTop:32,padding:20,background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:12}}>
    <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>🔐 Enrollment Code</div>
    <div style={{fontSize:12,color:"var(--text-muted)",marginBottom:16}}>Trainees must enter this code to create an account. Change it anytime to control who can register. Share this code only with trainees you want to enroll.</div>
    <div style={{display:"flex",gap:8,alignItems:"center"}}>
      <input value={code} onChange={e=>setCode(e.target.value.toUpperCase())} style={{flex:1,padding:"10px 14px",background:"var(--bg-input)",border:"1px solid var(--border)",borderRadius:8,color:"var(--text-primary)",fontSize:14,fontFamily:"inherit",letterSpacing:2,fontWeight:600,outline:"none"}} placeholder="ENROLLMENT-CODE"/>
      <button className="btn-primary" onClick={save} style={{padding:"10px 16px",whiteSpace:"nowrap"}}>{saved?"✓ Saved":"Save Code"}</button>
    </div>
    <div style={{fontSize:11,color:"var(--text-muted)",marginTop:8}}>Current code: <strong style={{color:"var(--warning)",letterSpacing:1}}>{loading?"...":code}</strong> — give this to new trainees so they can register.</div>
  </div>);
}

// ─── SETTINGS PAGE ──────────────────────────────────────────────────────────
function SettingsPage({progress,updateProgress}){
  const[oldPw,setOldPw]=useState("");const[newPw,setNewPw]=useState("");const[confirmPw,setConfirmPw]=useState("");
  const[msg,setMsg]=useState("");const[msgType,setMsgType]=useState("");

  const changePw=async()=>{
    setMsg("");setMsgType("");
    if(!oldPw){setMsg("Enter your current password.");setMsgType("err");return;}
    if(!newPw||newPw.length<4){setMsg("New password must be at least 4 characters.");setMsgType("err");return;}
    if(newPw!==confirmPw){setMsg("Passwords don't match.");setMsgType("err");return;}
    const key=progress.user.toLowerCase().replace(/\s+/g,"-");
    // Check if admin with built-in account
    const isBuiltInAdmin=ADMIN_ACCOUNTS[progress.user?.toLowerCase()];
    if(isBuiltInAdmin){
      // Admin: check all alias keys for current password
      const allKeys=[key];
      // Add all ADMIN_ACCOUNTS aliases that point to the same person
      Object.entries(ADMIN_ACCOUNTS).forEach(([alias,info])=>{
        if(info.fullName===isBuiltInAdmin.fullName){const ak=alias.replace(/\s+/g,"-");if(!allKeys.includes(ak))allKeys.push(ak)}
      });
      let currentPw=ADMIN_PASSWORD;
      for(const pk of allKeys){try{const sa=await loadAccount(pk);if(sa?.password){currentPw=sa.password;break;}}catch{}}
      if(oldPw!==currentPw){setMsg("Current password is incorrect.");setMsgType("err");return;}
      // Save new password under ALL alias keys so any login name works
      for(const pk of allKeys){
        const stored=await loadAccount(pk).catch(()=>null);
        const acctData=stored||{fullName:isBuiltInAdmin.fullName,email:isBuiltInAdmin.email,telegram:isBuiltInAdmin.telegram,createdAt:new Date().toISOString()};
        acctData.password=newPw;
        await saveAccount(pk,acctData);
      }
    }else{
      // Regular user
      const acct=await loadAccount(key);
      if(!acct){setMsg("Account not found.");setMsgType("err");return;}
      if(acct.password!==oldPw){setMsg("Current password is incorrect.");setMsgType("err");return;}
      acct.password=newPw;
      await saveAccount(key,acct);
    }
    setOldPw("");setNewPw("");setConfirmPw("");
    setMsg("Password changed successfully!");setMsgType("ok");
  };

  return(<div className="fade-in" style={{maxWidth:600}}>
    <h1 style={{fontSize:24,fontWeight:700,marginBottom:4}}>⚙️ Settings</h1>
    <p style={{color:"var(--text-secondary)",fontSize:14,marginBottom:28}}>Manage your account settings.</p>

    <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:12,padding:24,marginBottom:20}}>
      <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>👤 Account Info</div>
      <div style={{display:"grid",gap:8,marginTop:12}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}><span style={{color:"var(--text-muted)"}}>Name</span><span>{progress.user}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}><span style={{color:"var(--text-muted)"}}>Email</span><span>{progress.email||"—"}</span></div>

// ─── MODULE VIEW ─────────────────────────────────────────────────────────────
function ModuleView({dayIdx,modIdx,progress,updateProgress,setView}){
  const day=TRAINING_DATA.days[dayIdx];const mod=day.modules[modIdx];
  const[qa,setQa]=useState({});const[qs,setQs]=useState(false);const[et,setEt]=useState(progress.exerciseResponses[mod.id]||{});
  const[grading,setGrading]=useState(false);const[ag,setAg]=useState(null);
  const adm=progress.isAdmin;const done=progress.completedModules.includes(mod.id);
  const hq=mod.quiz&&mod.quiz.length>0;const he=mod.exercises&&mod.exercises.length>0;

  const submitQuiz=()=>{setQs(true);const c=mod.quiz.filter((q,i)=>qa[i]===q.answer).length;const sc=c/mod.quiz.length*100;
    const np={...progress,lastActive:new Date().toISOString(),quizScores:{...progress.quizScores,[mod.id]:sc}};
    if((sc>=70||adm)&&!done)np.completedModules=[...progress.completedModules,mod.id];updateProgress(np)};

  // ── AI Detection helper ──
  const detectAI=(text)=>{
    if(!text||text.length<30)return"none";
    let score=0;
    const t=text.trim();
    // Formal indicators
    const formalPhrases=["furthermore","in conclusion","it is worth noting","in my experience","i believe that","additionally","moreover","nevertheless","consequently","significantly","comprehensive","facilitate","utilize","implement","demonstrate","various aspects","in terms of","with regard to","it's important to","i would say that","overall i think","to be honest"];
    formalPhrases.forEach(p=>{if(t.toLowerCase().includes(p))score+=8});
    // Perfect structure (every sentence similar length)
    const sents=t.split(/[.!?]+/).filter(s=>s.trim().length>5);
    if(sents.length>=3){const lens=sents.map(s=>s.trim().length);const avg=lens.reduce((a,b)=>a+b,0)/lens.length;const variance=lens.reduce((a,l)=>a+Math.abs(l-avg),0)/lens.length;if(variance<15)score+=15}
    // No contractions
    if(!/\b(don't|can't|won't|I'm|I've|I'll|it's|that's|there's|wouldn't|couldn't|shouldn't|isn't|aren't|wasn't|weren't|didn't|doesn't|hasn't|haven't)\b/i.test(t)&&t.length>100)score+=12;
    // No personality markers
    if(!/[!]{2}|lol|haha|tbh|ngl|lowkey|kinda|gonna|wanna|gotta|yeah|nah|honestly|like,/i.test(t)&&t.length>80)score+=5;
    // Generic/vague content
    if(/passion|dedicated|committed|strive|thrive|excellence|growth mindset|continuous improvement|team player|driven individual/i.test(t))score+=10;
    // Bulleted structure disguised
    if((t.match(/\. [A-Z]/g)||[]).length>=4&&sents.length>=4)score+=5;
    if(score>=35)return"certain";if(score>=25)return"high";if(score>=15)return"medium";if(score>=8)return"low";return"none";
  };

  const gradeLocally=(exercises,responses)=>{
    const notes=[];let totalAiRisk="none";const aiLevels=[];
    const grades=exercises.map((ex,i)=>{
      const resp=(responses[i]||"").trim();
      if(resp.length<20)return{score:0,feedback:"Response too short. Write 2-4 full sentences.",ai_detected:"none"};
      const aiLevel=detectAI(resp);
      aiLevels.push(aiLevel);
      if(aiLevel==="certain"||aiLevel==="high")return{score:5,feedback:"⚠️ AI-generated response detected. Write your own answers without ChatGPT or any AI tools.",ai_detected:aiLevel};
      const words=resp.toLowerCase().split(/\s+/);
      const uniqueWords=new Set(words);
      const repetitionRatio=uniqueWords.size/words.length;
      if(repetitionRatio<0.3)return{score:5,feedback:"Extremely repetitive text. Write genuine sentences.",ai_detected:aiLevel};
      if(repetitionRatio<0.45)return{score:15,feedback:"Too much repeated content.",ai_detected:aiLevel};
      const chunks=[];for(let j=0;j<words.length-2;j++)chunks.push(words.slice(j,j+3).join(" "));
      const chunkSet=new Set(chunks);
      if(chunks.length>3&&chunkSet.size<chunks.length*0.5)return{score:10,feedback:"Repeated phrases detected.",ai_detected:aiLevel};
      const sentences=resp.split(/[.!?]+/).filter(s=>s.trim().length>3);
      if(sentences.length<2)return{score:30,feedback:"Write at least 2 complete sentences.",ai_detected:aiLevel};
      const startsWithCap=/^[A-Z]/.test(resp);
      const fillerWords=["work","football","tv","watch","go","thing","stuff","etc"];
      const contentWords=words.filter(w=>w.length>3&&!fillerWords.includes(w));
      if(contentWords.length<5)return{score:25,feedback:"Response lacks substance.",ai_detected:aiLevel};
      let score=50;
      if(sentences.length>=2)score+=10;if(sentences.length>=3)score+=5;
      if(startsWithCap)score+=5;if(uniqueWords.size>15)score+=10;
      if(contentWords.length>10)score+=10;if(repetitionRatio>0.7)score+=5;
      if(resp.includes(","))score+=3;if(resp.endsWith("."))score+=2;
      if(aiLevel==="medium")score=Math.min(score,60);
      score=Math.min(score,85);
      const fb=score>=70?"Adequate response.":score>=50?"Needs more detail and better structure.":"Poor quality. Write complete, thoughtful sentences.";
      return{score,feedback:fb,ai_detected:aiLevel};
    });
    // Generate detailed candidate notes
    const allResponses=Object.values(responses).filter(Boolean).map(r=>(r||"").trim());
    const avgLen=allResponses.reduce((s,r)=>s+r.length,0)/Math.max(allResponses.length,1);
    const allWords=allResponses.join(" ").toLowerCase().split(/\s+/);
    const allUnique=new Set(allWords);
    const vocabRichness=allWords.length>10?allUnique.size/allWords.length:0;
    const hasAI=aiLevels.some(l=>l==="high"||l==="certain");
    const hasSomeAI=aiLevels.some(l=>l==="medium");
    const avgSc=grades.reduce((s,g)=>s+g.score,0)/grades.length;
    // English quality notes
    if(hasAI)notes.push("⚠️ AI/ChatGPT detected — cannot assess genuine ability");
    else if(hasSomeAI)notes.push("⚠️ Some responses may be AI-assisted — monitor closely");
    if(!hasAI&&vocabRichness>0.65&&avgLen>150)notes.push("Strong vocabulary range — writes with variety and depth");
    if(!hasAI&&vocabRichness>0.7&&avgSc>=75)notes.push("Natural English flow — potential native-level communicator");
    if(vocabRichness<0.4&&!hasAI)notes.push("Limited vocabulary — may struggle with diverse fan conversations");
    // Effort & engagement
    if(avgLen>250&&!hasAI)notes.push("High effort — gives detailed, thoughtful responses");
    else if(avgLen>150&&!hasAI)notes.push("Good engagement — adequate detail in responses");
    else if(avgLen<80)notes.push("Minimal effort — very short responses, low engagement");
    // Sentence structure
    const avgSentences=allResponses.reduce((s,r)=>s+r.split(/[.!?]+/).filter(x=>x.trim().length>3).length,0)/Math.max(allResponses.length,1);
    if(avgSentences>=3&&!hasAI)notes.push("Good sentence structure — writes in complete, varied sentences");
    if(avgSentences<1.5)notes.push("Weak sentence construction — struggles to write complete thoughts");
    // Personality indicators
    const hasContractions=allResponses.some(r=>/\b(don't|can't|won't|I'm|I've|it's|that's|didn't)\b/i.test(r));
    if(hasContractions&&!hasAI)notes.push("Conversational writing style — uses natural contractions");
    // Overall assessment
    if(avgSc>=85&&!hasAI)notes.push("🌟 Strong candidate — recommend for fast-track");
    else if(avgSc>=70&&!hasAI)notes.push("Solid performer — meets standard, coach for improvement");
    else if(avgSc>=50)notes.push("Below average — needs significant improvement to be chat-ready");
    else if(avgSc<50)notes.push("Weak candidate — unlikely to perform in live chat environment");
    totalAiRisk=aiLevels.includes("certain")?"certain":aiLevels.includes("high")?"high":aiLevels.includes("medium")?"medium":"none";
    const overall=Math.round(avgSc);
    return{grades,overall,pass:overall>=70,ai_risk:totalAiRisk,candidate_notes:notes};
  };

  const submitExercises=async()=>{
    const filled=Object.values(et).filter(t=>t.trim().length>20);if(filled.length<(mod.exercises?.length||0)&&!adm)return;
    setGrading(true);const np={...progress,lastActive:new Date().toISOString(),exerciseResponses:{...progress.exerciseResponses,[mod.id]:et}};
    let result=null;
    // Try Netlify serverless function
    try{
      const ac=new AbortController();const to=setTimeout(()=>ac.abort(),6000);
      const r=await fetch("/api/grade",{method:"POST",headers:{"Content-Type":"application/json"},signal:ac.signal,
        body:JSON.stringify({exercises:mod.exercises.map((ex,i)=>({prompt:ex.prompt,response:et[i]||""})),moduleContext:mod.title+" - "+day.title,candidateName:progress.user})});
      clearTimeout(to);
      if(r.ok){const d=await r.json();if(d.grades&&d.overall!==undefined&&!d.error)result=d;}
    }catch(e){console.log("API grade failed, using local:",e.message)}
    // If API didn't work, use local grader immediately (free, no API needed)
    if(!result){result=gradeLocally(mod.exercises,et);}
    setAg(result);
    // Store candidate notes and AI risk on progress
    if(result.candidate_notes){np.candidateNotes={...(progress.candidateNotes||{}),[mod.id]:result.candidate_notes}}
    if(result.ai_risk&&result.ai_risk!=="none"){np.aiFlags={...(progress.aiFlags||{}),[mod.id]:result.ai_risk}}
    if((result.pass||adm)&&!done){np.completedModules=[...progress.completedModules,mod.id];np.quizScores={...progress.quizScores,[mod.id]:result.overall}}
    updateProgress(np);setGrading(false);};

  const markDone=()=>{if(!done){const np={...progress,lastActive:new Date().toISOString(),completedModules:[...progress.completedModules,mod.id]};updateProgress(np)}};
  const adminDone=()=>{if(!done){const np={...progress,lastActive:new Date().toISOString(),completedModules:[...progress.completedModules,mod.id],quizScores:{...progress.quizScores,[mod.id]:100}};updateProgress(np)}};

  if(mod.type==="graduation")return(<div className="graduation-view fade-in">
    <div className="trophy">🎓</div>
    <h1>Congratulations, {progress.user}!</h1>
    <p>{mod.content}</p>
    <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap",marginTop:8}}>
      <a href="https://fe02gsro908.typeform.com/to/LtaKFSnE" target="_blank" rel="noopener" style={{display:"inline-block",padding:"14px 32px",background:"linear-gradient(135deg,#6366f1,#ec4899)",color:"#fff",textDecoration:"none",fontSize:15,fontWeight:700,borderRadius:10,transition:"transform 0.2s"}}>Apply to Work With Us →</a>
      <button className="btn-secondary" onClick={()=>setView({page:"dashboard"})}>Return to Dashboard</button>
    </div>
    <p style={{fontSize:12,color:"var(--text-muted)",marginTop:16}}>Your training results and scores are saved. Our team will review your application alongside your academy performance.</p>
  </div>);

  const hasNext=modIdx<day.modules.length-1;
  return(<div className="content-view fade-in">
    <div className="content-header"><h1>{mod.title}</h1>
      <div className="meta-row">
        <span className="meta-item">⏱ {mod.duration}</span><span className="meta-item" style={{textTransform:"capitalize"}}>📝 {mod.type}</span>
        {done&&<span className="meta-item" style={{color:"var(--success)"}}>✓ Completed</span>}
        {progress.quizScores[mod.id]!==undefined&&<span className="meta-item" style={{color:progress.quizScores[mod.id]>=70?"var(--success)":"var(--danger)"}}>Score: {Math.round(progress.quizScores[mod.id])}%</span>}
        {adm&&!done&&<button className="btn-danger" onClick={adminDone} style={{marginLeft:"auto"}}>⚡ Admin: Force Complete</button>}
      </div>
    </div>
    <div className="content-body">{mod.content}</div>

    {he&&<div style={{marginBottom:32}}>
      <h3 style={{fontSize:16,fontWeight:600,marginBottom:16}}>✍️ Exercises</h3>
      {mod.exercises.map((ex,i)=><div key={i} className="exercise-card">
        <div className="prompt">{ex.prompt}</div>{ex.hint&&<div className="hint">{ex.hint}</div>}
        <textarea value={et[i]||""} onChange={e=>setEt(p=>({...p,[i]:e.target.value}))} placeholder="Write your response (2–4 full sentences)..." disabled={done&&!adm}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
          <span style={{fontSize:11,color:(et[i]?.trim().length||0)>=20?"var(--success)":"var(--text-muted)"}}>{(et[i]?.trim().length||0)>=20?"✓ Ready":"Write at least 2–4 full sentences"}</span>
          <span style={{fontSize:11,color:(et[i]?.trim().length||0)>=20?"var(--success)":"var(--text-muted)"}}>{et[i]?.trim().length||0} chars</span>
        </div>
        {ag?.grades?.[i]&&<div style={{marginTop:8,fontSize:12,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{color:ag.grades[i].score>=70?"var(--success)":"var(--danger)",fontWeight:600}}>{ag.grades[i].score}%</span>
          <span style={{color:"var(--text-muted)"}}>{ag.grades[i].feedback}</span>
          {ag.grades[i].ai_detected&&ag.grades[i].ai_detected!=="none"&&ag.grades[i].ai_detected!=="low"&&<span style={{fontSize:10,padding:"2px 6px",borderRadius:4,fontWeight:600,background:ag.grades[i].ai_detected==="certain"||ag.grades[i].ai_detected==="high"?"rgba(239,68,68,0.15)":"rgba(245,158,11,0.15)",color:ag.grades[i].ai_detected==="certain"||ag.grades[i].ai_detected==="high"?"var(--danger)":"var(--warning)"}}>🤖 {ag.grades[i].ai_detected==="certain"?"AI DETECTED":ag.grades[i].ai_detected==="high"?"LIKELY AI":"POSSIBLY AI"}</span>}
        </div>}
      </div>)}
      {!done&&!ag&&<div>{(()=>{const filled=Object.values(et).filter(t=>t?.trim().length>20).length;const total=mod.exercises.length;const ready=adm||filled>=total;return(<>
        {!ready&&<div style={{fontSize:12,color:"var(--warning)",marginBottom:10,padding:"10px 14px",background:"rgba(245,158,11,0.08)",borderRadius:8,border:"1px solid rgba(245,158,11,0.2)"}}>⚠️ {filled}/{total} responses meet the minimum length. Each answer must be at least 2–4 full sentences (20+ characters) before you can submit.</div>}
        <button className="btn-primary" onClick={submitExercises} disabled={grading||!ready}>{grading?"AI Grading...":"Submit for AI Grading"}</button>
      </>)})()}
        {grading&&<div className="grading-indicator"><div className="dot"/><div className="dot" style={{animationDelay:".3s"}}/><div className="dot" style={{animationDelay:".6s"}}/> Analyzing...</div>}</div>}
      {ag&&<div>
        {ag.ai_risk&&(ag.ai_risk==="high"||ag.ai_risk==="certain")&&<div style={{padding:"14px 18px",borderRadius:10,marginBottom:12,background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",fontSize:13,fontWeight:600,color:"var(--danger)"}}>🤖 AI/ChatGPT use detected. Write your own responses without AI assistance. AI-generated answers are automatically failed.</div>}
        {ag.ai_risk==="medium"&&<div style={{padding:"14px 18px",borderRadius:10,marginBottom:12,background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",fontSize:13,fontWeight:500,color:"var(--warning)"}}>⚠️ Some responses flagged as potentially AI-generated. Make sure you write all answers yourself.</div>}
        <div className={`quiz-result ${ag.pass?"pass":"fail"}`}>{ag.pass?`✓ Passed — ${ag.overall}%`:`✗ ${ag.overall}% — Need 70%. Review and retry.`}</div>
      </div>}
    </div>}

    {hq&&<div className="quiz-section">
      <h3>📋 Knowledge Check {done&&<span style={{fontSize:12,color:"var(--success)",fontWeight:400}}>— Done</span>}</h3>
      {mod.quiz.map((q,qi)=><div key={qi} className="quiz-card"><div className="question">{qi+1}. {q.q}</div>
        <div className="options">{q.options.map((o,oi)=>{let c="quiz-option";if(qs){if(oi===q.answer)c+=" correct";else if(qa[qi]===oi)c+=" incorrect"}else if(qa[qi]===oi)c+=" selected";
          return(<div key={oi} className={c} onClick={()=>!qs&&setQa(p=>({...p,[qi]:oi}))}><span className="letter">{String.fromCharCode(65+oi)}</span>{o}</div>)})}</div>
      </div>)}
      {!qs&&!done?<button className="btn-primary" onClick={submitQuiz} disabled={Object.keys(qa).length<mod.quiz.length}>Submit Answers</button>
        :qs&&<div className={`quiz-result ${(progress.quizScores[mod.id]>=70||adm)?"pass":"fail"}`}>{(progress.quizScores[mod.id]>=70||adm)?`✓ Passed — ${Math.round(progress.quizScores[mod.id])}%`:`✗ ${Math.round(progress.quizScores[mod.id])}% — Need 70%.`}</div>}
    </div>}

    {!hq&&!he&&!done&&<button className="btn-success" onClick={markDone} style={{marginTop:16}}>✓ Mark Complete</button>}
    <div className="actions-row">
      <button className="btn-secondary" onClick={()=>setView({page:"day",dayIdx})}>← {day.title}</button>
      {hasNext&&(done||adm)&&<button className="btn-primary" onClick={()=>setView({page:"module",dayIdx,modIdx:modIdx+1})}>Next Module →</button>}
      {!hasNext&&(done||adm)&&dayIdx<TRAINING_DATA.days.length-1&&<button className="btn-primary" onClick={()=>setView({page:"day",dayIdx:dayIdx+1})}>Next Phase →</button>}
    </div>
  </div>);
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App(){
  const[progress,setProgress]=useState(null);const[view,setView]=useState({page:"dashboard"});const[sb,setSb]=useState(false);const[loading,setLoading]=useState(true);
  useEffect(()=>{loadProgress().then(s=>{if(s?.user)setProgress(s);setLoading(false)})},[]);
  const update=useCallback(async np=>{np.lastActive=new Date().toISOString();setProgress(np);await saveProgress(np)},[]);
  const loginFromAccount=useCallback(async(acct)=>{
    const isBuiltIn=acct.isBuiltInAdmin||false;
    const existingKey=SP+acct.fullName.toLowerCase().replace(/\s+/g,"-");
    let existing=null;
    try{const r=await window.storage.get(existingKey,true);if(r?.value)existing=JSON.parse(r.value)}catch{}
    if(existing&&existing.user){
      existing.lastActive=new Date().toISOString();
      existing.email=acct.email;existing.telegram=acct.telegram;if(acct.country)existing.country=acct.country;
      if(isBuiltIn)existing.isAdmin=true;
      setProgress(existing);await saveProgress(existing);
    }else{
      const p={...initProgress(),user:acct.fullName,email:acct.email,telegram:acct.telegram,country:acct.country||null,isAdmin:isBuiltIn||isAdminUser(acct.fullName)};
      setProgress(p);await saveProgress(p);
    }
    if(isBuiltIn||isAdminUser(acct.fullName))setView({page:"admin"});
  },[]);
  const registerAccount=useCallback(async(acct)=>{
    const p={...initProgress(),user:acct.fullName,email:acct.email,telegram:acct.telegram,country:acct.country||null,isAdmin:isAdminUser(acct.fullName)};
    setProgress(p);await saveProgress(p);
    if(isAdminUser(acct.fullName))setView({page:"admin"});
  },[]);
  const signOut=useCallback(async()=>{setProgress(null);setView({page:"dashboard"});try{await window.storage.set(SK,JSON.stringify({user:null}))}catch{}},[]);

  if(loading)return(<div className="login-screen"><style>{CSS}</style><div style={{color:"var(--text-muted)",fontSize:13}}>Loading...</div></div>);
  if(!progress?.user)return(<><style>{CSS}</style><LoginScreen onLogin={loginFromAccount} onRegister={registerAccount}/></>);

  const bc=()=>{
    if(view.page==="admin")return[{label:"Admin Dashboard"}];if(view.page==="settings")return[{label:"Settings"}];if(view.page==="dashboard")return[{label:"Dashboard"}];
    if(view.page==="day")return[{label:"Dashboard",onClick:()=>setView({page:"dashboard"})},{label:TRAINING_DATA.days[view.dayIdx].title}];
    if(view.page==="module")return[{label:"Dashboard",onClick:()=>setView({page:"dashboard"})},{label:TRAINING_DATA.days[view.dayIdx].title,onClick:()=>setView({page:"day",dayIdx:view.dayIdx})},{label:TRAINING_DATA.days[view.dayIdx].modules[view.modIdx].title}];
    return[];
  };

  return(<><style>{CSS}</style><div className="app">
    <div className="mobile-toggle" onClick={()=>setSb(!sb)}>☰</div>
    <Sidebar progress={progress} view={view} setView={setView} sidebarOpen={sb} setSidebarOpen={setSb}/>
    <div className="main">
      <div className="main-header">
        <div className="breadcrumb">{bc().map((b,i,a)=><span key={i}>{b.onClick?<span style={{cursor:"pointer",color:"var(--text-muted)"}} onClick={b.onClick}>{b.label}</span>:<span className="current">{b.label}</span>}{i<a.length-1&&<span className="sep"> / </span>}</span>)}</div>
        <button className="sign-out-btn" onClick={signOut}>Sign Out</button>
      </div>
      <div className="main-content">
        {view.page==="admin"&&progress.isAdmin&&<AdminDashboard/>}
        {view.page==="settings"&&<SettingsPage progress={progress} updateProgress={update}/>}
        {view.page==="dashboard"&&<Dashboard progress={progress} setView={setView}/>}
        {view.page==="day"&&<DayView dayIdx={view.dayIdx} progress={progress} setView={setView}/>}
        {view.page==="module"&&<ModuleView dayIdx={view.dayIdx} modIdx={view.modIdx} progress={progress} updateProgress={update} setView={setView}/>}
      </div>
    </div>
  </div></>);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
</body>
</html>
